services:
  db:
    image: mariadb:11
    container_name: telecrm_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: telecrm
      MYSQL_USER: telecrm
      MYSQL_PASSWORD: telecrm_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "telecrm", "-ptelecrm_pass"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  backend:
    build: ./backend
    container_name: telecrm_api
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: telecrm
      DB_USER: telecrm
      DB_PASS: telecrm_pass
      PORT: 3000
    volumes:
      - uploads_data:/app/uploads
      - docs_data:/app/docs
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    container_name: telecrm_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
  uploads_data:
  docs_data:
